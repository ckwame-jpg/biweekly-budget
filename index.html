<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <!-- warm up the Google Fonts connections early (fonts load via @import in index.css) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <meta name="theme-color" content="#18895A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Budget" />
    <title>Bi-Weekly Budget — plan every paycheck, keep more of it</title>
    <meta name="description" content="A friendly budgeting app for people paid every two weeks. Plan your pay period, track Week 1 and Week 2 spending, and watch the one number that matters: money left over. No bank login required." />

    <!-- Open Graph / Twitter — how the link previews when shared -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Bi-Weekly Budget" />
    <meta property="og:title" content="Bi-Weekly Budget — plan every paycheck, keep more of it" />
    <meta property="og:description" content="A friendly budgeting app for people paid every two weeks. Track your spending, hit your savings goal, and escape the paycheck-to-paycheck cycle. No bank login required." />
    <meta property="og:image" content="/icons/icon-512.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Bi-Weekly Budget — plan every paycheck, keep more of it" />
    <meta name="twitter:description" content="A friendly budgeting app for people paid every two weeks. No bank login required." />
    <meta name="twitter:image" content="/icons/icon-512.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
